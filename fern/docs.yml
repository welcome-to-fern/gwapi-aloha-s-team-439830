# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

instances:
  - url: usdt-payments.docs.buildwithfern.com
    custom-domain: docs.gwapialoha.co
    edit-this-page:
      github:
        owner: welcome-to-fern
        repo: gwapi-aloha-s-team-439830
        branch: main
      launch: dashboard
ai-search:
  location:
    - docs
ai-examples:
  enabled: false
